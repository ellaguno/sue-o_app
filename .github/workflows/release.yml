name: Release AAB

# Se dispara al publicar un tag de versión, p. ej.:
#   git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags:
      - "v*"

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # versionCode único y creciente: derivado del número de corrida del workflow.
      - name: Compute versionCode
        run: echo "VERSION_CODE=${{ github.run_number }}" >> "$GITHUB_ENV"

      # Reconstruye el keystore y sus credenciales desde los Secrets del repo.
      # NUNCA se guardan en git; solo viven en el runner efímero de esta corrida.
      - name: Restore keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::error::Falta el secret KEYSTORE_BASE64 (y compañía). Configúralos en Settings → Secrets and variables → Actions."
            exit 1
          fi
          mkdir -p keystore
          echo "$KEYSTORE_BASE64" | base64 -d > keystore/upload-keystore.jks
          {
            echo "storeFile=keystore/upload-keystore.jks"
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > keystore.properties

      - name: Unit tests
        run: ./gradlew testDebugUnitTest

      - name: Build signed release bundle (AAB)
        run: ./gradlew :app:bundleRelease

      - name: Clean up signing material
        if: always()
        run: rm -f keystore.properties keystore/upload-keystore.jks

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: somnia-release-aab-${{ github.ref_name }}
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
